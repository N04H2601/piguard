services:
  piguard:
    build: .
    container_name: piguard
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: ${TZ:-UTC}
    ports:
      - "${PORT:-3333}:3333"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3333/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
