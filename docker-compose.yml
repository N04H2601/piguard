services:
  piguard:
    build: .
    container_name: piguard
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: ${TZ:-UTC}
    network_mode: host
    pid: host
    cap_add:
      - NET_ADMIN
    volumes:
      - ./data:/app/data
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3333/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
